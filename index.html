<!doctype html>
<html lang="en">
  <head>
    <!-- Character Set & Viewport -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title & Meta Description for SEO -->
    <title>Eddie Zaldivar | Fractional Strategy & Technical Execution</title>
    <meta
      name="description"
      content="Eddie Zaldivar provides expert fractional strategy and technical execution, crafted with care. Empowering businesses through strategy, technology, and results."
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Theme Color for Mobile Devices -->
    <meta name="theme-color" content="#BFA98A" />

    <!-- Open Graph Meta Tags for Social Sharing -->
    <meta property="og:title" content="Eddie Zaldivar | Strategy & Execution" />
    <meta
      property="og:description"
      content="Fractional strategy and technical execution crafted with care. Empowering businesses through innovation."
    />
    <meta property="og:image" content="/images/og-image.jpg" />
    <meta property="og:url" content="https://eddiezaldivar.com" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Eddie Zaldivar | Strategy & Execution" />
    <meta
      name="twitter:description"
      content="Fractional strategy and technical execution crafted with care. Empowering businesses through innovation."
    />
    <meta name="twitter:image" content="/images/og-image.jpg" />

    <!-- Preconnect to Google Fonts for Better Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin="anonymous" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />

    <!-- Google Fonts for Modern Craftsman Aesthetic -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=EB+Garamond:wght@400;600&family=Nunito:wght@400;600;700&family=Raleway:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Preload Key Fonts for Performance -->
    <link rel="preload" href="/fonts/playfair.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
    <link rel="preload" href="/fonts/nunito.woff2" as="font" type="font/woff2" crossorigin="anonymous" />

    <!-- Link to Compiled Tailwind Output CSS -->
    <link rel="stylesheet" href="/dist/output.css" />
  </head>

  <body class="bg-warm-white text-navy-dark font-sans leading-relaxed antialiased">
    <!-- Main React Root -->
    <div id="root"></div>

    <!-- Main Application Script -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
